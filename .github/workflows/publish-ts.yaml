name: Publish TypeScript to NPM

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish"
        required: true
        type: string

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  REGISTRY_URL: "https://registry.npmjs.org"

jobs:
  build:
    name: Build tarball
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Build xion-types tarball
        run: bash scripts/ci/helper/build-ts-tarball.sh ts/

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: xion-types-tarball
          path: ts/*.tgz
          retention-days: 1

  test-dependent-projects:
    name: Test ${{ matrix.project }}
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - xion-explorer
          - xion-faucet
          - xion-staking
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4
        with:
          path: xion-types
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: xion-types-tarball
          path: xion-types/ts/

      - name: Checkout Dependent Project
        uses: actions/checkout@v4
        with:
          repository: burnt-labs/${{ matrix.project }}
          path: dependent-project
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Test proto compatibility
        run: |
          TARBALL=$(ls xion-types/ts/*.tgz 2>/dev/null | head -1)
          bash xion-types/scripts/ci/helper/test-ts-compat.sh dependent-project "$TARBALL"

  publish:
    name: Publish to NPM
    needs: [test-dependent-projects]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.REGISTRY_URL }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bash scripts/ci/ts.sh "${{ inputs.release_tag }}"
