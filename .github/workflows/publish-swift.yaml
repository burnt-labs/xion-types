name: Publish Swift to CocoaPods

on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: true
        type: string
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string

jobs:
  build:
    name: Build Swift Package
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Derive version
        id: version
        run: |
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup package structure
        run: python3 scripts/post/swift.py

      - name: Stamp version & Build
        run: bash scripts/ci/swift.sh "${{ steps.version.outputs.version }}" --build

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: swift-package
          path: swift/
          retention-days: 1

  test:
    name: Test Swift Package
    needs: [build]
    runs-on: macos-latest
    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: swift-package
          path: swift/

      - name: Test
        working-directory: ./swift
        run: swift test -c release -Xswiftc -j1

  publish:
    name: Publish to CocoaPods
    needs: [test, build]
    runs-on: macos-latest
    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: swift-package
          path: swift/

      - name: Setup CocoaPods
        run: sudo gem install cocoapods

      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/ci
          path: repo

      - name: Create Podspec & Publish
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: bash repo/scripts/ci/swift.sh "${{ needs.build.outputs.version }}"
