name: Release

# Called by upstream xion publish-release.yaml (workflow_call)
# or triggered manually. Generates all types, commits to a branch,
# and creates a PR to main.

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Xion ref (git tag or full/short SHA, e.g. v28.1.0 or 0ae6add)"
        required: true
        type: string
      contracts_ref:
        description: "burnt-labs/contracts git ref (tag or full/short SHA, e.g. v1.0.1 or 3d49b1d)"
        required: false
        type: string
        default: "v1.0.1"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Xion ref (git tag or full/short SHA, e.g. v28.1.0 or 0ae6add)"
        required: true
        type: string
      contracts_ref:
        description: "burnt-labs/contracts git ref (tag or full/short SHA, e.g. v1.0.1 or 3d49b1d)"
        required: false
        type: string
        default: "v1.0.1"

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─── Stage 1a: Resolve upstream SHAs and compose release tag ────────
  resolve-sources:
    name: Resolve Sources
    runs-on: ubuntu-latest
    outputs:
      xion_sha: ${{ steps.resolve.outputs.xion_sha }}
      xion_sha_short: ${{ steps.resolve.outputs.xion_sha_short }}
      contracts_sha: ${{ steps.resolve.outputs.contracts_sha }}
      contracts_sha_short: ${{ steps.resolve.outputs.contracts_sha_short }}
      composite_tag: ${{ steps.resolve.outputs.composite_tag }}
    steps:
      - name: Resolve xion and contracts refs to SHAs
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          CONTRACTS_REF: ${{ inputs.contracts_ref }}
        run: |
          set -euo pipefail

          # GitHub's /commits/{ref} endpoint accepts tags, branches, and SHAs.
          XION_SHA=$(gh api "repos/burnt-labs/xion/commits/$RELEASE_TAG" --jq '.sha')
          CONTRACTS_SHA=$(gh api "repos/burnt-labs/contracts/commits/$CONTRACTS_REF" --jq '.sha')

          XION_SHORT="${XION_SHA:0:7}"
          CONTRACTS_SHORT="${CONTRACTS_SHA:0:7}"
          COMPOSITE="${RELEASE_TAG}-${XION_SHORT}-${CONTRACTS_SHORT}"

          echo "xion_sha=$XION_SHA" >> "$GITHUB_OUTPUT"
          echo "xion_sha_short=$XION_SHORT" >> "$GITHUB_OUTPUT"
          echo "contracts_sha=$CONTRACTS_SHA" >> "$GITHUB_OUTPUT"
          echo "contracts_sha_short=$CONTRACTS_SHORT" >> "$GITHUB_OUTPUT"
          echo "composite_tag=$COMPOSITE" >> "$GITHUB_OUTPUT"

          echo "Resolved composite tag: $COMPOSITE"
          echo "  xion $RELEASE_TAG → $XION_SHA"
          echo "  contracts $CONTRACTS_REF → $CONTRACTS_SHA"

  # ─── Stage 1b: Discover language matrix dynamically ─────────────────
  discover-languages:
    name: Discover Languages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build language matrix from top-level dirs
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          TOP_DIRS=$(ls -d */ | sed 's#/##' | sort)
          MATRIX=$(for d in $TOP_DIRS; do
            # Keep only directories that have a corresponding buf.gen.<dir>.yaml
            # This naturally excludes irrelevant dirs like scripts, docker, etc.
            if [ -f "buf/buf.gen.${d}.yaml" ]; then
              echo "$d"
            fi
          done | jq -R . | jq -cs '{language: .}')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Languages: $MATRIX"

  # ─── Stage 2: Build proto-builder image once ────────────────────────
  build-proto-image:
    name: Build Proto Image
    runs-on: ubuntu-latest
    outputs:
      proto_version: ${{ steps.meta.outputs.proto_version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: make build-proto-builder-image

      - name: Resolve proto version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          PROTO_VERSION=$(awk -F= '/^protoVer=/{print $2}' Makefile)
          echo "proto_version=$PROTO_VERSION" >> "$GITHUB_OUTPUT"

      - name: Save Docker image tarball
        shell: bash
        run: |
          set -euo pipefail
          docker save "localhost/proto-builder:${{ steps.meta.outputs.proto_version }}" -o proto-builder-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v7
        with:
          name: proto-builder-image
          path: proto-builder-image.tar
          if-no-files-found: error

  # ─── Stage 3: Generate in parallel via matrix ───────────────────────
  generate:
    name: Generate (${{ matrix.language }})
    needs: [discover-languages, build-proto-image, resolve-sources]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-languages.outputs.matrix) }}
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      # Pass the user's literal input through to BSR. BSR accepts named
      # labels, tags, and its own commit IDs. If a caller passes a git
      # SHA that BSR hasn't indexed as a label, the `buf generate` call
      # will fail loudly — that's the caller's responsibility.
      XION_BSR_MODULE: "buf.build/burnt-labs/xion:${{ inputs.release_tag }}"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout burnt-labs/contracts
        if: matrix.language == 'ts'
        uses: actions/checkout@v6
        with:
          repository: burnt-labs/contracts
          ref: ${{ needs.resolve-sources.outputs.contracts_sha }}
          path: contracts
          fetch-depth: 1

      - name: Download Docker image artifact
        uses: actions/download-artifact@v8
        with:
          name: proto-builder-image
          path: .

      - name: Load Docker image
        run: docker load -i proto-builder-image.tar

      - name: Generate language
        run: make proto-gen-${{ matrix.language }}

      - name: Stage language artifact with root directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _artifact
          cp -a "${{ matrix.language }}" "_artifact/"

      - name: Upload generated language artifact
        uses: actions/upload-artifact@v7
        with:
          name: generated-${{ matrix.language }}
          path: _artifact/
          if-no-files-found: error

  # ─── Stage 4: Assemble artifacts, commit, and create PR ─────────────
  commit-and-pr:
    name: Commit & PR
    needs: [discover-languages, build-proto-image, generate, resolve-sources]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      CONTRACTS_REF: ${{ inputs.contracts_ref }}
      XION_SHA: ${{ needs.resolve-sources.outputs.xion_sha }}
      XION_SHA_SHORT: ${{ needs.resolve-sources.outputs.xion_sha_short }}
      CONTRACTS_SHA: ${{ needs.resolve-sources.outputs.contracts_sha }}
      CONTRACTS_SHA_SHORT: ${{ needs.resolve-sources.outputs.contracts_sha_short }}
      COMPOSITE_TAG: ${{ needs.resolve-sources.outputs.composite_tag }}
      BRANCH: types/${{ needs.resolve-sources.outputs.composite_tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Create types branch
        run: git checkout -B "$BRANCH"

      - name: Download generated artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: generated-*
          merge-multiple: true
          path: .

      - name: Commit generated types
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit \
            -m "chore: generate types for $COMPOSITE_TAG" \
            -m "xion: $RELEASE_TAG ($XION_SHA)" \
            -m "contracts: $CONTRACTS_REF ($CONTRACTS_SHA)"

          # Reruns for the same composite tag should update the same branch cleanly.
          git fetch origin "$BRANCH" || true
          git push --force-with-lease -u origin "$BRANCH"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        id: pr
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR_URL=$(gh pr list \
            --base main \
            --head "$BRANCH" \
            --state open \
            --json url \
            --jq '.[0].url // empty')

          if [ -n "$EXISTING_PR_URL" ]; then
            PR_URL="$EXISTING_PR_URL"
            echo "PR already exists for $BRANCH: $PR_URL"
          else
            PR_BODY_FILE="$(mktemp)"
            {
              echo "Auto-generated protobuf types."
              echo ""
              echo "| Source | Input | Resolved commit |"
              echo "|--------|-------|-----------------|"
              echo "| [burnt-labs/xion](https://github.com/burnt-labs/xion) | \`$RELEASE_TAG\` | [\`$XION_SHA_SHORT\`](https://github.com/burnt-labs/xion/commit/$XION_SHA) |"
              echo "| [burnt-labs/contracts](https://github.com/burnt-labs/contracts) | \`$CONTRACTS_REF\` | [\`$CONTRACTS_SHA_SHORT\`](https://github.com/burnt-labs/contracts/commit/$CONTRACTS_SHA) |"
              echo ""
              echo "Composite release tag: \`$COMPOSITE_TAG\`"
            } > "$PR_BODY_FILE"

            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: update types for $COMPOSITE_TAG" \
              --body-file "$PR_BODY_FILE" \
              --label "automated")
          fi

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "✅ Created PR: $PR_URL"

      - name: Enable auto-merge on PR
        if: steps.commit.outputs.has_changes == 'true' && steps.pr.outputs.pr_url != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          # Auto-merge kicks in once branch protection checks pass. Idempotent:
          # re-enabling on a PR that already has auto-merge is a no-op.
          gh pr merge "$PR_URL" --auto --squash

      - name: No-op when nothing changed
        if: steps.commit.outputs.has_changes != 'true'
        run: echo "No generated changes for $COMPOSITE_TAG; skipping PR creation"

  # ─── Summary ───────────────────────────────────────────────────────
  summary:
    name: Summary
    needs: [resolve-sources, discover-languages, build-proto-image, generate, commit-and-pr]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report
        env:
          COMPOSITE_TAG: ${{ needs.resolve-sources.outputs.composite_tag }}
          RESOLVE_RESULT: ${{ needs.resolve-sources.result }}
          DISCOVER_RESULT: ${{ needs.discover-languages.result }}
          IMAGE_RESULT: ${{ needs.build-proto-image.result }}
          GENERATE_RESULT: ${{ needs.generate.result }}
          COMMIT_RESULT: ${{ needs.commit-and-pr.result }}
        run: |
          echo "## Release Summary for $COMPOSITE_TAG"
          echo ""
          echo "| Stage | Result |"
          echo "|-------|--------|"
          echo "| Resolve Sources | $RESOLVE_RESULT |"
          echo "| Discover Languages | $DISCOVER_RESULT |"
          echo "| Build Proto Image | $IMAGE_RESULT |"
          echo "| Generate (matrix) | $GENERATE_RESULT |"
          echo "| Commit & PR | $COMMIT_RESULT |"

          for r in "$RESOLVE_RESULT" "$DISCOVER_RESULT" "$IMAGE_RESULT" "$GENERATE_RESULT" "$COMMIT_RESULT"; do
            if [ "$r" = "failure" ]; then
              echo ""
              echo "❌ Release pipeline failed"
              exit 1
            fi
          done
          echo ""
          echo "✅ Release pipeline succeeded"
