name: Release

# Called by upstream xion publish-release.yaml (workflow_call)
# or triggered manually. Generates all types, commits to a branch,
# and creates a PR to main.

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Xion release tag (e.g. v26.0.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Xion release tag (e.g. v26.0.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─── Stage 1: Discover language matrix dynamically ──────────────────
  discover-languages:
    name: Discover Languages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Build language matrix from top-level dirs
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          TOP_DIRS=$(ls -d */ | sed 's#/##' | sort)
          MATRIX=$(for d in $TOP_DIRS; do
            # Keep only directories that have a corresponding buf.gen.<dir>.yaml
            # This naturally excludes irrelevant dirs like scripts, docker, xion, etc.
            if [ -f "buf/buf.gen.${d}.yaml" ]; then
              echo "$d"
            fi
          done | jq -R . | jq -cs '{language: .}')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Languages: $MATRIX"

  # ─── Stage 2: Build proto-builder image once ────────────────────────
  build-proto-image:
    name: Build Proto Image
    runs-on: ubuntu-latest
    outputs:
      proto_version: ${{ steps.meta.outputs.proto_version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: make build-proto-builder-image

      - name: Resolve proto version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          PROTO_VERSION=$(awk -F= '/^protoVer=/{print $2}' Makefile)
          echo "proto_version=$PROTO_VERSION" >> "$GITHUB_OUTPUT"

      - name: Save Docker image tarball
        shell: bash
        run: |
          set -euo pipefail
          docker save "localhost/proto-builder:${{ steps.meta.outputs.proto_version }}" -o proto-builder-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: proto-builder-image
          path: proto-builder-image.tar
          if-no-files-found: error

  # ─── Stage 3: Generate in parallel via matrix ───────────────────────
  generate:
    name: Generate (${{ matrix.language }})
    needs: [discover-languages, build-proto-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-languages.outputs.matrix) }}
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      XION_BSR_MODULE: "buf.build/burnt-labs/xion:${{ inputs.release_tag }}"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download Docker image artifact
        uses: actions/download-artifact@v5
        with:
          name: proto-builder-image
          path: .

      - name: Load Docker image
        run: docker load -i proto-builder-image.tar

      - name: Generate language
        run: make proto-gen-${{ matrix.language }}

      - name: Stage language artifact with root directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _artifact
          cp -a "${{ matrix.language }}" "_artifact/"

      - name: Upload generated language artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-${{ matrix.language }}
          path: _artifact/
          if-no-files-found: error

  # ─── Stage 4: Assemble artifacts, commit, and create PR ─────────────
  commit-and-pr:
    name: Commit & PR
    needs: [discover-languages, build-proto-image, generate]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      BRANCH: types/${{ inputs.release_tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          submodules: recursive

      - name: Create types branch
        run: git checkout -B "$BRANCH"

      - name: Download generated artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: generated-*
          merge-multiple: true
          path: .

      - name: Commit generated types
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: generate types for $RELEASE_TAG"
          # Reruns for the same tag should update the same branch cleanly.
          git fetch origin "$BRANCH" || true
          git push --force-with-lease -u origin "$BRANCH"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        id: pr
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR_URL=$(gh pr list \
            --base main \
            --head "$BRANCH" \
            --state open \
            --json url \
            --jq '.[0].url // empty')

          if [ -n "$EXISTING_PR_URL" ]; then
            PR_URL="$EXISTING_PR_URL"
            echo "PR already exists for $BRANCH: $PR_URL"
          else
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: update types for $RELEASE_TAG" \
              --body "Auto-generated protobuf types for xion [\`$RELEASE_TAG\`](https://github.com/burnt-labs/xion/releases/tag/$RELEASE_TAG)." \
              --label "automated")
          fi

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "✅ Created PR: $PR_URL"

      - name: No-op when nothing changed
        if: steps.commit.outputs.has_changes != 'true'
        run: echo "No generated changes for $RELEASE_TAG; skipping PR creation"

  # ─── Summary ───────────────────────────────────────────────────────
  summary:
    name: Summary
    needs: [discover-languages, build-proto-image, generate, commit-and-pr]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: |
          echo "## Release Summary for ${{ inputs.release_tag }}"
          echo ""
          echo "| Stage | Result |"
          echo "|-------|--------|"
          echo "| Discover Languages | ${{ needs.discover-languages.result }} |"
          echo "| Build Proto Image | ${{ needs.build-proto-image.result }} |"
          echo "| Generate (matrix) | ${{ needs.generate.result }} |"
          echo "| Commit & PR | ${{ needs.commit-and-pr.result }} |"

          if [ "${{ needs.discover-languages.result }}" = "failure" ] || [ "${{ needs.build-proto-image.result }}" = "failure" ] || [ "${{ needs.generate.result }}" = "failure" ] || [ "${{ needs.commit-and-pr.result }}" = "failure" ]; then
            echo ""
            echo "❌ Release pipeline failed"
            exit 1
          fi
          echo ""
          echo "✅ Release pipeline succeeded"
