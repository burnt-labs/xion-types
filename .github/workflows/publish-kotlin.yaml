name: Publish Kotlin to Maven Central

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish"
        required: true
        type: string

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Derive version
        id: version
        run: |
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build JAR
        run: bash scripts/ci/kotlin.sh build "${{ steps.version.outputs.version }}"

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-build
          path: kotlin/
          retention-days: 1

  test:
    name: Test (JDK ${{ matrix.jdk }})
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jdk: ["17", "21"]
    steps:
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.jdk }}
          distribution: temurin

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: kotlin-build
          path: kotlin/

      - name: Checkout test helper
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/ci/helper
          path: repo

      - name: Download Kotlin compiler & test
        run: bash repo/scripts/ci/helper/test-kotlin-types.sh kotlin

  publish:
    name: Publish to Maven Central
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: kotlin-build
          path: kotlin/

      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/ci
          path: repo

      - name: Publish
        env:
          VERSION: ${{ needs.build.outputs.version }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: bash repo/scripts/ci/kotlin.sh publish "$VERSION"
