name: TypeScript Bigint Typecheck

on:
  push:
    branches: [main]
    paths:
      - "ts/**"
      - ".github/workflows/typecheck-ts.yaml"
  pull_request:
    paths:
      - "ts/**"
      - ".github/workflows/typecheck-ts.yaml"

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  typecheck:
    name: Verify bigint compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        working-directory: ts
        run: pnpm install --frozen-lockfile

      - name: Typecheck (bigint compat)
        working-directory: ts
        run: pnpm typecheck
